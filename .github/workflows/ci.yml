name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Compile source
        run: python -m compileall src scripts tests
      - name: Train sample model
        run: PYTHONPATH=src python scripts/train_model.py --no-mlflow
      - name: Promote approved model
        run: PYTHONPATH=src python scripts/promote_model.py --min-roc-auc 0.70 --min-average-precision 0.50
      - name: Build Docker image
        run: docker build -t credit-risk-mlops-aws:ci .
